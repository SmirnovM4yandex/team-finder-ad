services:
  web:
    image: newsmirnovm/teamfinder:latest

    container_name: teamfinder_web

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn team_finder.wsgi:application --bind 0.0.0.0:8000
      "

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

    restart: always

  db:
    image: postgres:16

    container_name: teamfinder_db

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

volumes:
  postgres_data: